# Loads JSON dashboards from ./json (mounted at /etc/grafana/provisioning/dashboards/json).
apiVersion: 1
providers:
  - name: Tsummix
    orgId: 1
    folder: Tsummix
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
